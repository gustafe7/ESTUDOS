<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        html,
        body,
        div {
            height: 100%;

            /* Cor do fundo */
            background-color: #fff;
        }

        div {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 256px;

            /* Cor do ícone */
            color: orange;

            /* Cor da borda do ícone */
            -webkit-text-stroke: 8px #000000;
        }
    </style>
    <title>Gerador de Favicon</title>
</head>

<body>

    <div>

        <!-- Ícone fo Font Awesome que será favicon -->
        <i class="fa-brands fa-opensuse fa-fw"></i>

    </div>


</body>

</html>
